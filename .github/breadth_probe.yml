# 등락 종목 수 JSON 소스 탐색 probe — 수동 실행 전용 (probe before building)
# 실행: GitHub → Actions → breadth probe → Run workflow
# 로그 전체를 복사해 검토하면 등락 종목 수 엔드포인트 + 필드명을 확정할 수 있다.
# (수집·저장 없음. 순수 진단용.)
name: breadth probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: run breadth probe
        run: python engine/breadth_probe.py
