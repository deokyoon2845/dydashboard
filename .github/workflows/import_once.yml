name: DB 이관(일회용)

# Actions 탭에서 수동으로 [Run workflow] 버튼을 눌러 한 번만 실행
on:
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install supabase

      - name: reports/ → Supabase 이관
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python import_reports.py
