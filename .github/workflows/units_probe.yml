name: units 세대수 API 프로브 (수동)

# ──────────────────────────────────────────────────────────────────────────
#  세대수 소스 프로브 v3 — K-apt '벌크 XLSX'(엔진 1순위 소스) 경로 검증.
#  Actions → 이 워크플로 → Run workflow → 로그의 [1]~[3] 결과를 확인.
#  판독법은 engine/units_probe.py 독스트링에 있음:
#    · [1] 다운로드 OK + 수도권 수천 단지 파싱 → 성공(내일 크론부터 정상 재빌드)
#    · [1] 403/타임아웃 → k-apt도 데이터센터 IP 차단 — 결과 공유 후 다음 스텝
#    · [3] 기본정보 API가 살아나면 ②순위 폴백으로 자동 복귀(별도 조치 불필요)
# ──────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: 파이썬 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 라이브러리 설치 (프로브 전용 — 가볍게)
        run: pip install requests xmltodict pandas openpyxl

      - name: 세대수 API 프로브 실행
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: python -m engine.units_probe
