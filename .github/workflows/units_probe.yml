name: units 세대수 API 프로브 (수동)

# ──────────────────────────────────────────────────────────────────────────
#  세대수 소스 프로브 v4 — REB 식별정보 odcloud(엔진 벌크 1순위 소스) 검증.
#  ★ 사전 1회: data.go.kr 로그인 → 파일데이터 15106861 → '오픈API' 탭 →
#    활용신청(자동승인). 그 다음 Run workflow → 로그의 [1]~[3] 확인.
#  판독법은 engine/units_probe.py 독스트링에 있음:
#    · [2] 수도권 수천 단지 + 은마/파크리오 세대수 → 성공(내일 크론부터 재빌드)
#    · [1] 401/403 → 활용신청 미완 · 타임아웃/기타 → 결과 공유 후 다음 스텝
#    · [3] 기본정보 API가 살아나면 ②순위 폴백으로 자동 복귀(별도 조치 불필요)
# ──────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: 파이썬 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 라이브러리 설치 (프로브 전용 — 가볍게)
        run: pip install requests xmltodict

      - name: 세대수 API 프로브 실행
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: python -m engine.units_probe
