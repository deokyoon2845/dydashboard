name: 증시 IPO 수집 (일일)

# ──────────────────────────────────────────────────────────────────────────
#  최근 2년 신규상장(시총 2,000억↑)·향후 IPO를 매일 06:00 KST 수집해
#  Supabase(ipo_snapshots)에 저장한다. 뷰어(modules/ipo.py)는 DB만 읽는다.
#  · 금융위 주식시세정보는 기준일 T+1 13:00 KST 갱신 → 06:00 KST 실행은 전일자 데이터 사용(무해).
#  · 다른 잡(daily/realestate)과 잡 이름·테이블이 달라 충돌 없음.
#  · 수동 실행도 가능: Actions → 이 워크플로 → Run workflow.
#  ※ 최초 1회 Supabase에서 ipo_snapshots 테이블 생성 필요(modules/db.py 상단 SQL).
#
#  필요한 secret:
#    SUPABASE_URL / SUPABASE_KEY
#    DATA_GO_KR_KEY (없으면 MOLIT_API_KEY)  — data.go.kr 디코딩 인증키
#    DART_API_KEY   — opendart 인증키(향후 IPO 일정용; 없으면 향후 섹션만 비고 진행)
# ──────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '7 21 * * *'        # 21:07 UTC ≈ 06:07 KST (정각 회피로 지연↓)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ipo-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: 필수 시크릿 점검
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        shell: bash
        run: |
          missing=""
          for v in SUPABASE_URL SUPABASE_KEY; do
            if [ -z "${!v}" ]; then missing="$missing $v"; fi
          done
          if [ -z "$DATA_GO_KR_KEY$MOLIT_API_KEY" ]; then
            missing="$missing DATA_GO_KR_KEY(또는_MOLIT_API_KEY)"
          fi
          if [ -n "$missing" ]; then
            echo "::error::필수 시크릿이 비어 있습니다 →$missing"
            exit 1
          fi
          echo "✅ 필수 시크릿 확인 — 수집 단계로 진행합니다."

      - name: 파이썬 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: IPO 수집 → Supabase 저장
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m engine.ipo_run


      # ── 실패 시 텔레그램 알림(조용한 실패 방어) — curl만 사용해 pip 실패에도 동작 ──
      - name: 실패 시 텔레그램 알림
        if: failure()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "텔레그램 시크릿 없음 — 알림 건너뜀"; exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT=$(printf '⚠️ <b>%s</b> 실패\n실행 로그: %s' "${{ github.workflow }}" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            -d "parse_mode=HTML" -d "disable_web_page_preview=true" >/dev/null || true
          echo "실패 알림 발송 시도 완료"
