name: starts-probe

# v4 '착공' 성분 재설계용 1회성 진단 — KOSIS 서울+경기·레벨형·임대제외 실측.
# 수동 실행 전용 · 결과는 로그로만(쓰기 없음). engine/macro_lag_probe.py를
# import 하므로 착공 확정 전까지 그 파일을 삭제하지 말 것(확정 후 함께 삭제).
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: run probe
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python -m engine.starts_probe
