name: 주도주 수집 (일일)

# ──────────────────────────────────────────────────────────────────────────
#  전종목을 스캔해 주도 섹터·주도주를 점수화하고 Supabase(leaders)에 저장한다.
#  뷰어(modules/leaders.py)는 이 최신 행만 읽는다. 모든 데이터는 Naver(프로브에서
#  Actions 동작 확인) — 별도 API 키 불필요, SUPABASE 키만 있으면 된다.
#  · 16:40 KST(평일) 우선 — KRX 장마감(15:30)·종가확정(16:00) 후 Naver 일별 종가로 수집.
#    지연/드롭 대비 17:40·18:40 KST 백업 슬롯. 첫 성공 후 나머지는 멱등 가드로 스킵.
#  · 증시 키워드(테마 탭)도 장마감 후 여기서 함께 생성한다(네이버 뉴스+Haiku).
#  · 리포트(daily.yml)·부동산(realestate.yml)과 잡 이름·테이블·시간이 달라 충돌 없음.
#  · 수동 실행도 가능: Actions → 이 워크플로 → Run workflow.
#  ※ 최초 1회 Supabase에서 leaders 테이블 생성 필요(modules/db.py 상단 SQL).
# ──────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 16:40·17:40·18:40 KST(평일) 3슬롯 — KRX 종가(16:00 KST)가 확정된 뒤 최이른 시각으로
    # 당기고, GitHub cron 지연/드롭에 대비해 1시간 간격으로 3번 시도한다. 첫 성공이 leaders를
    # 저장하면 엔진의 멱등 가드(collected_today)가 나머지 슬롯을 즉시 스킵한다.
    - cron: '40 7,8,9 * * 1-5'   # 07:40·08:40·09:40 UTC = 16:40·17:40·18:40 KST
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: leaders-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: 필수 시크릿 점검
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        shell: bash
        run: |
          missing=""
          for v in SUPABASE_URL SUPABASE_KEY; do
            if [ -z "${!v}" ]; then missing="$missing $v"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::필수 시크릿이 비어 있습니다 →$missing"
            exit 1
          fi
          echo "✅ 필수 시크릿 확인 — 수집 단계로 진행합니다."

      - name: 파이썬 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 주도주 수집 → Supabase 저장
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # ↓ 증시 키워드(테마 탭) 생성용 — 장마감 후 leaders_run에서 함께 만든다.
          #   없으면 키워드만 조용히 건너뛰고 주도주 수집은 정상 진행.
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m engine.leaders_run


      # ── 실패 시 텔레그램 알림(조용한 실패 방어) — curl만 사용해 pip 실패에도 동작 ──
      - name: 실패 시 텔레그램 알림
        if: failure()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "텔레그램 시크릿 없음 — 알림 건너뜀"; exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT=$(printf '⚠️ <b>%s</b> 실패\n실행 로그: %s' "${{ github.workflow }}" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            -d "parse_mode=HTML" -d "disable_web_page_preview=true" >/dev/null || true
          echo "실패 알림 발송 시도 완료"
