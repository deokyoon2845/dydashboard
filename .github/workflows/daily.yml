name: 전략시황 보고서 생성 (수동 전용)

# ──────────────────────────────────────────────────────────────────────────
#  ★자동(예약) 실행 전면 제거됨.★
#  예전의 schedule(cron) 블록을 삭제해, GitHub이 스스로 돌리는 일은 더 이상 없다.
#  이제 보고서는 '내가 원할 때'만 만들어진다. 두 가지 수동 방법:
#   1) GitHub → Actions → '전략시황 보고서 생성 (수동 전용)' → Run workflow
#      (리포트+키워드 생성 + 텔레그램 발송까지 전체 파이프라인 실행)
#   2) Streamlit 앱 → 시황 탭 맨 아래 '🌅 장전 / 🌆 장마감 후 보고서 생성' 버튼
#      (DB에 저장됨. 단, 이 경로는 텔레그램 발송은 안 함)
# ──────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:        # 오직 수동 실행 버튼으로만 트리거

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      # ── 필수 시크릿 점검: 비어 있으면 '여기서' 빨간 X로 멈춤 ──
      - name: 필수 시크릿 점검
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        shell: bash
        run: |
          missing=""
          for v in ANTHROPIC_API_KEY SUPABASE_URL SUPABASE_KEY \
                   TELEGRAM_API_ID TELEGRAM_API_HASH TELEGRAM_SESSION; do
            if [ -z "${!v}" ]; then missing="$missing $v"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::필수 시크릿이 비어 있습니다 →$missing"
            echo "GitHub 저장소 → Settings → Secrets and variables → Actions 에서 추가하세요."
            exit 1
          fi
          echo "✅ 필수 시크릿 모두 존재 — 생성 단계로 진행합니다."

      - name: 파이썬 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 보고서·키워드 생성 + 텔레그램 발송
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # ★ 빈 문자열이면 400 에러 → 시크릿이 없어도 기본값으로 폴백.
          REPORT_MODEL: ${{ secrets.REPORT_MODEL || 'claude-opus-4-8' }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: python -m engine.run_all

      - name: 결과 커밋 & 푸시 (키워드·data 백업 — 보고서는 DB에 저장됨)
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ data/ || true
          if git diff --staged --quiet; then
            echo "커밋할 변경 없음 — 건너뜀"
            exit 0
          fi
          git commit -m "수동 생성: $(date -u +%Y-%m-%d) ($(date -u +%H:%MUTC))"
          git pull --rebase origin main || true
          git push
