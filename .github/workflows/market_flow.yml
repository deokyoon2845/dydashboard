# 수급 상위 종목(외국인·기관) 수집 → Supabase(market_flow)
#
# 필요한 GitHub Secrets: SUPABASE_URL / SUPABASE_KEY
# (data.go.kr 키 불필요 — pykrx 사용)
#
# ※ 최초 1회 Supabase에 market_flow 테이블 생성 필요(modules/db.py 상단 SQL).
# ※ 이 잡은 'pykrx가 Actions에서 동작하는지' 시험도 겸한다.
#    로그에 '코스피 외국인 5 · 기관 5'면 정상 / 0이면 pykrx가 Actions에서도 막힌 것.

name: market-flow

on:
  schedule:
    - cron: '30 8 * * 1-5'       # 08:30 UTC = 17:30 KST (장 마감 후, 평일)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: 키 점검
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          missing=""
          for v in SUPABASE_URL SUPABASE_KEY; do
            if [ -z "${!v}" ]; then missing="$missing $v"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::필수 시크릿 누락 →$missing"; exit 1
          fi
          echo "✅ 시크릿 확인 — 수집 진행"

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 수급 상위 수집
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m engine.market_flow
