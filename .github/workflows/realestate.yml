name: 부동산 실거래 수집 (일일)

# ──────────────────────────────────────────────────────────────────────────
#  KB 가격지수·국토부 실거래·청약홈 분양정보를 매일 07:00 KST 수집해
#  Supabase(realestate_snapshots)에 저장한다. 뷰어(modules/realestate.py)는 DB만 읽는다.
#  · 리포트 파이프라인(daily.yml)과 분리 — 잡 이름·테이블이 달라 충돌 없음.
#  · 부동산은 일/주 단위 신선도라 cron 지연(증시에서 문제였던)이 사실상 무해.
#  · 수동 실행도 가능: Actions → 이 워크플로 → Run workflow.
#  ※ 최초 1회 Supabase에서 realestate_snapshots 테이블 생성 필요(modules/db.py 상단 SQL).
# ──────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '7 22 * * *'       # 매일 22:07 UTC ≈ 07:07 KST · KB·국토부·분양 자동 수집 (정각 회피)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: realestate-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: 필수 시크릿 점검
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        shell: bash
        run: |
          missing=""
          for v in SUPABASE_URL SUPABASE_KEY; do
            if [ -z "${!v}" ]; then missing="$missing $v"; fi
          done
          if [ -z "$MOLIT_API_KEY$PUBLIC_DATA_API_KEY$DATA_GO_KR_KEY" ]; then
            missing="$missing MOLIT_API_KEY(또는_PUBLIC_DATA_API_KEY/DATA_GO_KR_KEY)"
          fi
          if [ -n "$missing" ]; then
            echo "::error::필수 시크릿이 비어 있습니다 →$missing"
            echo "GitHub → Settings → Secrets and variables → Actions 에서 추가하세요."
            exit 1
          fi
          echo "✅ 필수 시크릿 확인 — 수집 단계로 진행합니다."

      - name: 파이썬 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 부동산 실거래 수집 → Supabase 저장
        env:
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m engine.realestate_run


      # ── 실패 시 텔레그램 알림(조용한 실패 방어) — curl만 사용해 pip 실패에도 동작 ──
      - name: 실패 시 텔레그램 알림
        if: failure()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "텔레그램 시크릿 없음 — 알림 건너뜀"; exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT=$(printf '⚠️ <b>%s</b> 실패\n실행 로그: %s' "${{ github.workflow }}" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            -d "parse_mode=HTML" -d "disable_web_page_preview=true" >/dev/null || true
          echo "실패 알림 발송 시도 완료"
