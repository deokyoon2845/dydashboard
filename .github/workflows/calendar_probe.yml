name: 캘린더 소스 프로브 — FnGuide vs DART (수동)

# ──────────────────────────────────────────────────────────────────────────
#  실적·IR 캘린더 소스 비교 프로브 — 시장탭 캘린더에 잠정실적·IR 일정 추가 검토.
#  Run workflow → 로그의 [1]~[3] 확인. 판독법은 engine/calendar_probe.py 독스트링:
#    · [1] FnGuide 200 + 잠정실적 행 → 파싱 가능(단 약관 리스크 별개)
#          403/타임아웃/키워드X → FnGuide 탈락
#    · [2] DART 잠정실적 N건·IR M건 매칭 → DART 소스 충분
#    · [3] IR 원문에서 개최일시 발췌가 찍히면 → 미래 IR 일정까지 커버 확정
# ──────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: 파이썬 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 라이브러리 설치 (프로브 전용 — 가볍게)
        run: pip install requests

      - name: 캘린더 소스 프로브 실행
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python -m engine.calendar_probe
