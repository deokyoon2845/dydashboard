# 거시지표 API probe — 수동 실행 전용 (probe before building)
# 실행: GitHub → Actions → macro probe → Run workflow
# 로그 전체를 복사해 검토하면 ECOS/KOSIS 통계코드·항목코드를 확정할 수 있다.
name: macro probe

on:
  workflow_dispatch:
    inputs:
      extra_kosis_tbl:
        description: "KOSIS 후보 추가 (orgId:tblId,orgId:tblId 형식 · 선택)"
        required: false
        default: ""

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: run macro probe
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          EXTRA_KOSIS_TBL: ${{ github.event.inputs.extra_kosis_tbl }}
        run: python engine/macro_probe.py
