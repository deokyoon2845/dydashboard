# 종목 마스터(종목명 ↔ 종목코드) 일일 수집 → Supabase(stock_master)
#
# 필요한 GitHub Secrets:
#   SUPABASE_URL / SUPABASE_KEY
#   DATA_GO_KR_KEY (없으면 MOLIT_API_KEY) — data.go.kr 디코딩 인증키
#
# ※ 최초 1회 Supabase에 stock_master 테이블 생성 필요(modules/db.py 상단 SQL).

name: stock-master

on:
  schedule:
    # 06:20·07:20 KST 2슬롯 — KRX 데이터는 T+1이라 시각 제약이 없다. 지연/드롭 대비
    # 백업 슬롯을 두고, 첫 성공 후 엔진 멱등 가드(collected_today)로 나머지를 스킵한다.
    - cron: '20 21,22 * * *'     # 21:20·22:20 UTC = 06:20·07:20 KST
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 키 점검
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: |
          missing=""
          for v in SUPABASE_URL SUPABASE_KEY; do
            if [ -z "$(eval echo \$$v)" ]; then missing="$missing $v"; fi
          done
          if [ -z "$DATA_GO_KR_KEY$MOLIT_API_KEY" ]; then
            missing="$missing DATA_GO_KR_KEY(또는_MOLIT_API_KEY)"
          fi
          if [ -n "$missing" ]; then
            echo "필수 시크릿 누락:$missing"; exit 1
          fi

      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 종목 마스터 수집
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: python -m engine.stock_master


      # ── 실패 시 텔레그램 알림(조용한 실패 방어) — curl만 사용해 pip 실패에도 동작 ──
      - name: 실패 시 텔레그램 알림
        if: failure()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "텔레그램 시크릿 없음 — 알림 건너뜀"; exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT=$(printf '⚠️ <b>%s</b> 실패\n실행 로그: %s' "${{ github.workflow }}" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            -d "parse_mode=HTML" -d "disable_web_page_preview=true" >/dev/null || true
          echo "실패 알림 발송 시도 완료"
