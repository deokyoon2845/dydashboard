# 종목 마스터(종목명 ↔ 종목코드) 일일 수집 → Supabase(stock_master)
#
# 필요한 GitHub Secrets:
#   SUPABASE_URL / SUPABASE_KEY
#   DATA_GO_KR_KEY (없으면 MOLIT_API_KEY) — data.go.kr 디코딩 인증키
#
# ※ 최초 1회 Supabase에 stock_master 테이블 생성 필요(modules/db.py 상단 SQL).

name: stock-master

on:
  schedule:
    - cron: '20 21 * * *'        # 21:20 UTC = 06:20 KST (KRX 데이터는 T+1)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 키 점검
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: |
          missing=""
          for v in SUPABASE_URL SUPABASE_KEY; do
            if [ -z "$(eval echo \$$v)" ]; then missing="$missing $v"; fi
          done
          if [ -z "$DATA_GO_KR_KEY$MOLIT_API_KEY" ]; then
            missing="$missing DATA_GO_KR_KEY(또는_MOLIT_API_KEY)"
          fi
          if [ -n "$missing" ]; then
            echo "필수 시크릿 누락:$missing"; exit 1
          fi

      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 종목 마스터 수집
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
        run: python -m engine.stock_master
